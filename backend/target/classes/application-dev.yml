spring:
  cloud:
    gateway:
      routes:
        - id: irs-user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**

        - id: irs-report-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/reports/**

        - id: irs-etl-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/etl/**

        - id: irs-export-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/exports/**

        - id: irs-scheduler-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/schedules/**

        - id: irs-audit-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/audit/**
  data:
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

jwt:
  secret: ${JWT_SECRET:dev-only-local-secret-key-not-for-production-use-32bytes}

logging:
  level:
    root: INFO
    com.ipdc.irs.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
